[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/var/run/supervisord.pid

[program:blazor]
command=dotnet /app/Bilboard.dll
autostart=true
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
directory=/app
environment=ASPNETCORE_URLS="http://0.0.0.0:8080"

[program:api]
command=dotnet /app/api/Presentation.dll
autostart=true
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
directory=/app/api
environment=ASPNETCORE_URLS="http://0.0.0.0:8081"