[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:blazor]
command=dotnet /app/Bilboard/Bilboard.dll
autostart=true
autorestart=true
stderr_logfile=/var/log/blazor.err.log
stdout_logfile=/var/log/blazor.out.log
environment=ASPNETCORE_URLS="http://0.0.0.0:8080",ASPNETCORE_ENVIRONMENT="Production"

[program:api]
command=dotnet /app/Presentation/Presentation.dll
autostart=true
autorestart=true
stderr_logfile=/var/log/api.err.log
stdout_logfile=/var/log/api.out.log
environment=ASPNETCORE_URLS="http://0.0.0.0:8081",ASPNETCORE_ENVIRONMENT="Production"